        名字: "1"
        描述: 人物出场
        背景音乐: resources/ShengYin/a.mp3
        字幕: 
        持续时间: 3秒
        动作:
          -
            名称: 行进
            角色: 摩托车
            开始位置: [0.1, 0.6] # 左上角
            结束位置: [0.8, 0.4]
            比例: [0.1, 0.06]  # 比例变化，开始比例 - 结束比例
            方式: 自然 #跳跃、旋转
          -
            名称: 行进
            角色: 沙雕
            开始位置: [0.06, 0.4] # 左上角
            结束位置: [0.8, 0.2]
            比例: [0.1, 0.06]  # 比例变化，开始比例 - 结束比例
            方式: 自然 #跳跃、旋转
