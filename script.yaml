            名称: 行进
            角色: 沙雕
            开始位置: [0.8, 0.2] # 左上角
            结束位置: [0.2, 0.2]
            比例: [0.06, 0.15]  # 比例变化，开始比例 - 结束比例
            方式: 旋转
      -
        名字: "3.1"
        描述: 看摩托车
        背景音乐: 
        字幕: 
        持续时间: 1秒
        动作:
