场景: # 每个场景共用一套角色和背景，不同的场景使用不同的角色和背景
  -
    背景: resources/JiChuSuCai/BeiJing/raining.gif
    焦点: "中心"
    比例: 1
    角色:
      -
        名字: 摩托车
        素材: resources/JiChuSuCai/JiaoTongGongJu/MoTuoChe/1.png
